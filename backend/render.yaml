services:
  - type: web
    name: inventoryai-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPINFRA_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EXTRA_CORS_ORIGINS
        sync: false
      - key: APP_SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: LANGCHAIN_TRACING_V2
        value: "false"
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFICATION_FROM_EMAIL
        sync: false
